<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview and Select Images</title>
</head>
<body>
    <h1>Select Images to Upload</h1>
    <form method="POST">
        {% for img in images %}
        <div>
            <img src="{{ img }}" alt="Extracted Image" style="max-width: 300px; max-height: 300px;">
            <input type="checkbox" name="selected_images" value="{{ img }}">
        </div>
        {% endfor %}
        <button type="submit">Upload Selected</button>
    </form>
</body>
</html>
